<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tipster</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f9ff;
}

/* 🌌 SPLASH */
#splash {
  position: fixed;
  width: 100%;
  height: 100vh;
  background:
    linear-gradient(135deg, rgba(26,0,51,0.85), rgba(58,12,163,0.85), rgba(114,0,38,0.85)),
    url('YOUR_IMAGE_LINK_HERE') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.card {
  font-size: 60px;
  animation: flip 2.5s ease;
}

@keyframes flip {
  0% { transform: rotateY(0deg) scale(0.5); }
  50% { transform: rotateY(180deg) scale(1.3); }
  100% { transform: rotateY(360deg) scale(1); }
}

.title {
  font-size: 30px;
  color: white;
  text-align: center;
  text-shadow: 0 0 20px #00ffcc;
}

/* APP */
#app {
  display: none;
  padding-bottom: 120px;
}

/* NAV (UPGRADED) */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
  border-top: 1px solid #ccc;
}

.nav div {
  cursor: pointer;
  color: #888;
  font-size: 13px;
  text-align: center;
}

.nav div span {
  display: block;
  font-size: 22px;
}

.nav .active {
  color: #2962ff;
  font-weight: bold;
}

/* SECTIONS */
.section { display: none; }
.activeSection { display: block; }

/* SEARCH */
.search {
  padding: 15px;
}
.search input {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
}

/* TARGET ODDS */
.targetBox {
  margin: 10px 15px;
  padding: 15px;
  background: white;
  border-radius: 15px;
}

.targetBox input {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: 1px solid #ccc;
  margin-top: 8px;
}

/* LEAGUES */
.leagues {
  display: flex;
  overflow-x: auto;
  padding: 10px;
}
.league {
  padding: 14px 20px;
  margin-right: 10px;
  background: white;
  border-radius: 25px;
  font-weight: bold;
  cursor: pointer;
}
.activeLeague {
  background: #2962ff;
  color: white;
}

/* MATCH */
.match {
  background: white;
  margin: 15px;
  padding: 25px;
  border-radius: 18px;
  font-size: 18px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

.teams {
  font-size: 20px;
  font-weight: bold;
}

.pickRow {
  margin-top: 12px;
  display: flex;
  justify-content: space-between;
}

.pick {
  background: #e3f2fd;
  padding: 10px 14px;
  border-radius: 12px;
  cursor: pointer;
}

.selected {
  border: 2px solid #2962ff;
}

/* BUTTON */
button {
  width: 90%;
  margin: 20px;
  padding: 18px;
  border-radius: 14px;
  border: none;
  background: #2962ff;
  color: white;
  font-size: 18px;
}

/* RESULT */
.result {
  margin: 15px;
  padding: 20px;
  background: white;
  border-radius: 15px;
}

/* WARNING */
.warning {
  color: red;
  font-weight: bold;
  margin-top: 10px;
}
</style>
</head>

<body>

<div id="splash">
  <div>
    <div class="card">🃏</div>
    <div class="title">Tipster</div>
  </div>
</div>

<div id="app">

<div id="home" class="section activeSection">

<div class="search">
  <input placeholder="Search..." oninput="searchMatch(this.value)">
</div>

<!-- 🎯 TARGET ODDS -->
<div class="targetBox">
  🎯 Enter Target Odds (optional)
  <input type="number" id="targetOdds" placeholder="e.g. 5.0">
  <div id="riskWarning" class="warning"></div>
</div>

<div class="leagues" id="leagueBar"></div>

<div id="matches"></div>

<button onclick="generateSlip()">Generate Slip</button>

</div>

<div id="picks" class="section">
  <div id="result" class="result"></div>
</div>

<div id="chat" class="section">
  <div class="result">💬 Coming soon</div>
</div>

<div id="bot" class="section">
  <div class="result">🤖 Coming soon</div>
</div>

</div>

<!-- NAV UPDATED -->
<div class="nav">
  <div onclick="switchTab(this,'home')" class="active"><span>🏠</span>Home</div>
  <div onclick="switchTab(this,'picks')"><span>📊</span>Slip</div>
  <div onclick="switchTab(this,'chat')"><span>💬</span>Chat</div>
  <div onclick="switchTab(this,'bot')"><span>🤖</span>Bot</div>
</div>

<div id="popup" class="popup"></div>

<script>

const splash = document.getElementById("splash");
const app = document.getElementById("app");
const matches = document.getElementById("matches");

/* SPLASH */
setTimeout(()=>{
  splash.style.display="none";
  app.style.display="block";
},2500);

/* DATA */
const leagues=["All","Premier","La Liga"];
const allMatches=[
  {id:1,name:"Arsenal vs Chelsea",league:"Premier"},
  {id:2,name:"Barcelona vs Sevilla",league:"La Liga"},
  {id:3,name:"Bayern vs Dortmund",league:"All"}
];

let matchState = {};
let currentList=[...allMatches];

allMatches.forEach(m=>{
  matchState[m.id]={
    pick:["Over 1.5","BTTS","Double Chance"][Math.floor(Math.random()*3)],
    odds:(Math.random()*1+1.2).toFixed(2),
    selected:false
  };
});

const leagueBar=document.getElementById("leagueBar");

leagues.forEach(l=>{
  let div=document.createElement("div");
  div.className="league";
  div.innerText=l;

  div.onclick=()=>{
    document.querySelectorAll(".league").forEach(x=>x.classList.remove("activeLeague"));
    div.classList.add("activeLeague");

    currentList = l==="All"?allMatches:allMatches.filter(m=>m.league===l);
    loadMatches(currentList);
  };

  leagueBar.appendChild(div);
});

/* LOAD */
function loadMatches(list){
  matches.innerHTML="";

  list.forEach(m=>{
    let state=matchState[m.id];

    let div=document.createElement("div");
    div.className="match";
    if(state.selected) div.classList.add("selected");

    div.innerHTML=`
      <div class="teams">${m.name}</div>
      <div class="pickRow">
        <div class="pick">${state.pick}</div>
        <div>${state.odds}</div>
      </div>
    `;

    div.onclick=()=>{
      state.selected=!state.selected;
      div.classList.toggle("selected");
    };

    div.querySelector(".pick").onclick=(e)=>{
      e.stopPropagation();
      state.pick = prompt("Enter option:", state.pick) || state.pick;
      loadMatches(currentList);
    };

    matches.appendChild(div);
  });
}

loadMatches(currentList);

/* SEARCH */
function searchMatch(val){
  loadMatches(currentList.filter(m=>m.name.toLowerCase().includes(val.toLowerCase())));
}

/* GENERATE */
function generateSlip(){
  let total=1;
  let count=0;
  let html="<b>Slip</b><br><br>";

  allMatches.forEach(m=>{
    let state=matchState[m.id];
    if(state.selected){
      total*=state.odds;
      count++;
      html+=`${m.name} → ${state.pick} (${state.odds})<br>`;
    }
  });

  if(count===0){
    result.innerHTML="⚠️ No selections yet";
    return;
  }

  let target=document.getElementById("targetOdds").value;
  let warning="";

  if(target && total < target){
    warning="⚠️ Your target odds are higher than current slip. Risk may increase.";
  }

  document.getElementById("riskWarning").innerText=warning;

  html+=`<br><b>Total Odds: ${total.toFixed(2)}</b>`;
  result.innerHTML=html;

  switchTab(document.querySelectorAll(".nav div")[1],'picks');
}

/* NAV */
function switchTab(el,id){
  document.querySelectorAll(".nav div").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");

  document.querySelectorAll(".section").forEach(s=>s.classList.remove("activeSection"));
  document.getElementById(id).classList.add("activeSection");
}

</script>

</body>
</html>
