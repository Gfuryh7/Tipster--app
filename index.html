<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tipster</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to bottom, #0a0f2c, #000);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    header {
      text-align: center;
      padding: 30px;
      font-size: 32px;
      font-weight: bold;
      letter-spacing: 2px;
    }
    .matches {
      width: 90%;
      max-width: 500px;
      padding: 10px;
    }
    .match {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      margin-bottom: 12px;
      padding: 18px;
      border-radius: 12px;
      cursor: pointer;
      transition: 0.3s;
      text-align: center;
    }
    .match:hover {
      background: rgba(255, 255, 255, 0.1);
    }
    .selected {
      border: 2px solid #00ff99;
      background: rgba(0, 255, 153, 0.1);
    }
    button {
      width: 90%;
      max-width: 500px;
      margin: 20px;
      padding: 18px;
      border: none;
      border-radius: 12px;
      background: #00ff99;
      color: black;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(0, 255, 153, 0.3);
    }
    .result {
      width: 85%;
      max-width: 480px;
      padding: 20px;
      background: #111;
      border-top: 4px solid #00ff99;
      margin: 20px;
      border-radius: 12px;
      min-height: 50px;
    }
  </style>
</head>
<body>

<header>🃏 TIPSTER</header>

<div class="matches" id="matches-container"></div>

<button onclick="generateSlip()">Generate Safe Slip</button>

<div class="result" id="result-display">
  <span style="color: #666;">Select matches above to generate a slip...</span>
</div>

<script>
  // 1. DATABASE: Strengths of the teams
  const teamData = {
    "Arsenal": 88,
    "Man City": 92,
    "Liverpool": 89,
    "Chelsea": 80,
    "Barcelona": 87,
    "Sevilla": 78,
    "Bayern": 91,
    "Dortmund": 84,
    "PSG": 89,
    "Lyon": 77
  };

  // 2. MATCH LIST: The games showing on screen
  const matches = [
    "Arsenal vs Chelsea",
    "Barcelona vs Sevilla",
    "Bayern vs Dortmund",
    "Man City vs Liverpool",
    "PSG vs Lyon"
  ];

  const container = document.getElementById("matches-container");

  // Create the match boxes
  matches.forEach(matchName => {
    const div = document.createElement("div");
    div.className = "match";
    div.innerText = matchName;
    div.onclick = () => {
      div.classList.toggle("selected");
    };
    container.appendChild(div);
  });

  // 3. BRAIN: The logic that replaces "Random"
  function getSmartPrediction(matchText) {
    const teams = matchText.split(" vs ");
    const homeTeam = teams[0];
    const awayTeam = teams[1];

    // Get strengths or use 75 as average
    const hStr = teamData[homeTeam] || 75;
    const aStr = teamData[awayTeam] || 75;
    const diff = hStr - aStr;

    if (diff > 7) {
      return { pick: "Home Win (1)", reason: `${homeTeam} is statistically much stronger.` };
    } else if (diff < -7) {
      return { pick: "Away Win (2)", reason: `The advantage lies with ${awayTeam} today.` };
    } else {
      return { pick: "Over 1.5 Goals", reason: "Expect a tight game with attacking play." };
    }
  }

  // 4. GENERATOR: Runs when button is clicked
  function generateSlip() {
    const selectedMatches = document.querySelectorAll(".selected");

    if (selectedMatches.length === 0) {
      alert("Please select at least one match first!");
      return;
    }

    let finalHTML = "<h3 style='margin-top:0;'>📋 YOUR SMART SLIP</h3>";

    selectedMatches.forEach(item => {
      const result = getSmartPrediction(item.innerText);
      
      finalHTML += `
        <div style="margin-bottom: 15px; border-bottom: 1px solid #333; padding-bottom: 10px;">
          <div style="font-size: 0.9em; color: #888;">${item.innerText}</div>
          <div style="font-weight: bold; color: #00ff99;">${result.pick}</div>
          <div style="font-size: 0.8em; font-style: italic; color: #aaa;">" ${result.reason} "</div>
        </div>
      `;
    });

    document.getElementById("result-display").innerHTML = finalHTML;
  }
</script>

</body>
</html>
