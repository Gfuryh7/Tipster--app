<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tipster</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #0a0f2c, #000);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}
header {
  padding: 25px;
  font-size: 28px;
  font-weight: bold;
}
.matches {
  width: 90%;
  max-width: 500px;
}
.match {
  background: rgba(255,255,255,0.05);
  padding: 15px;
  margin-bottom: 10px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
}
.selected {
  border: 2px solid #00ff99;
}
button {
  width: 90%;
  max-width: 500px;
  padding: 15px;
  margin: 20px;
  background: #00ff99;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}
.result {
  width: 90%;
  max-width: 500px;
  background: #111;
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>🃏 TIPSTER</header>

<div class="matches" id="matches"></div>

<button onclick="generateSlip()">Generate Smart Slip</button>

<div class="result" id="result"></div>

<script>

// 🔥 TEAM POWER DATABASE (simulate real stats)
const teams = {
  "Man City": 95,
  "Arsenal": 90,
  "Liverpool": 92,
  "Chelsea": 82,
  "Barcelona": 89,
  "Real Madrid": 93,
  "Sevilla": 80,
  "Bayern": 94,
  "Dortmund": 86,
  "PSG": 91,
  "Lyon": 78
};

// 🌍 MATCHES (simulate real leagues)
const matches = [
  { league: "EPL", game: "Man City vs Liverpool" },
  { league: "EPL", game: "Arsenal vs Chelsea" },
  { league: "La Liga", game: "Barcelona vs Sevilla" },
  { league: "La Liga", game: "Real Madrid vs Valencia" },
  { league: "Bundesliga", game: "Bayern vs Dortmund" },
  { league: "UCL", game: "PSG vs Bayern" }
];

const container = document.getElementById("matches");

// 🧱 DISPLAY MATCHES
matches.forEach(m => {
  const div = document.createElement("div");
  div.className = "match";
  div.innerText = `${m.league} • ${m.game}`;
  div.onclick = () => div.classList.toggle("selected");
  container.appendChild(div);
});

// 🧠 SMART ENGINE
function predict(matchText) {
  const game = matchText.split("• ")[1];
  const [home, away] = game.split(" vs ");

  const h = teams[home] || 75;
  const a = teams[away] || 75;
  const diff = h - a;

  // Probability
  let probability = 50 + diff * 1.5;
  probability = Math.max(5, Math.min(95, probability));

  if (diff > 10) {
    return {
      pick: `${home} Win`,
      reason: `${home} is much stronger`,
      odds: "1.40",
      chance: probability + "%"
    };
  }

  if (diff > 5) {
    return {
      pick: `${home} Win or Over 1.5`,
      reason: `${home} has advantage`,
      odds: "1.65",
      chance: probability + "%"
    };
  }

  if (Math.abs(diff) <= 5) {
    return {
      pick: "Over 2.5 Goals",
      reason: "Balanced strong teams → goals likely",
      odds: "1.80",
      chance: "65%"
    };
  }

  return {
    pick: `${away} Win or Double Chance`,
    reason: `${away} slightly stronger`,
    odds: "1.75",
    chance: (100 - probability) + "%"
  };
}

// 🎯 GENERATE SLIP
function generateSlip() {
  const selected = document.querySelectorAll(".selected");

  if (selected.length === 0) {
    alert("Select matches first");
    return;
  }

  let html = "<h3>📋 SMART BET SLIP</h3>";

  selected.forEach(m => {
    const res = predict(m.innerText);

    html += `
      <div style="margin-bottom:10px;border-bottom:1px solid #333;">
        <small>${m.innerText}</small><br>
        <b style="color:#00ff99">${res.pick}</b><br>
        <small>${res.reason}</small><br>
        <small>Odds: ${res.odds} | Chance: ${res.chance}</small>
      </div>
    `;
  });

  document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
