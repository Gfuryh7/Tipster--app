<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tipster</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #f4f6f9, #dfe6ee);
}

/* HEADER */
header {
  text-align: center;
  padding: 15px;
  font-weight: bold;
  background: white;
}

/* MATCHES */
.match {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}
.selected {
  border: 2px solid green;
}

/* BUTTON */
button {
  width: 90%;
  margin: 10px auto;
  display: block;
  padding: 12px;
  background: green;
  color: white;
  border: none;
  border-radius: 8px;
}

/* RESULT */
.result {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
}

/* NAVBAR */
.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 15px;
  font-size: 16px;
  border-top: 1px solid #ccc;
}
.active {
  color: green;
}
</style>
</head>

<body>

<header>🃏 TIPSTER</header>

<input id="targetOdds" placeholder="Enter target odds (e.g. 5)" />

<div id="matches"></div>

<button onclick="generate()">Generate Slip</button>

<div id="result" class="result"></div>

<div class="navbar">
  <div>Matches</div>
  <div>Slip</div>
</div>

<script>

// TEAM POWER
const teams = {
  "Arsenal": 90,
  "Wolves": 75,
  "Man City": 95,
  "Liverpool": 92
};

// MATCHES
const matches = [
  "Arsenal vs Wolves",
  "Man City vs Liverpool"
];

// DISPLAY
const container = document.getElementById("matches");

matches.forEach(m => {
  const div = document.createElement("div");
  div.className = "match";
  div.innerText = m;
  div.onclick = () => div.classList.toggle("selected");
  container.appendChild(div);
});

// SMART PICKS WITH ODDS
function getOptions(match) {
  const [home, away] = match.split(" vs ");
  const diff = (teams[home]||75) - (teams[away]||75);

  let options = [];

  options.push({pick: `${home} Over 0.5`, odds: 1.25});
  options.push({pick: "Over 1.5", odds: 1.35});

  if(diff > 5) {
    options.push({pick: `${home} Double Chance`, odds: 1.40});
  }

  if(diff > 8) {
    options.push({pick: `${home} Win`, odds: 1.60});
  }

  return options;
}

// GENERATE
function generate() {
  const selected = document.querySelectorAll(".selected");
  const target = parseFloat(document.getElementById("targetOdds").value);

  let totalOdds = 1;
  let html = "<h3>📋 BET SLIP</h3>";

  selected.forEach(m => {
    const options = getOptions(m.innerText);

    const best = options[0]; // safest
    totalOdds *= best.odds;

    html += `
      <b>${m.innerText}</b><br>
      ${best.pick} (Odds: ${best.odds})<br><br>
    `;
  });

  html += `<hr><b>Total Odds: ${totalOdds.toFixed(2)}</b>`;

  if(target) {
    html += `<br>Target: ${target}`;
  }

  document.getElementById("result").innerHTML = html;
}

// SIMPLE AI
function explain() {
  alert("These picks are chosen based on safest scoring probability and team strength.");
}

</script>

<button onclick="explain()">Ask AI 🤖</button>

</body>
</html>
