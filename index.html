<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tipster</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f9ff;
}

/* 🌌 SPLASH */
#splash {
  position: fixed;
  width: 100%;
  height: 100vh;
  background:
    linear-gradient(135deg, rgba(26,0,51,0.85), rgba(58,12,163,0.85), rgba(114,0,38,0.85)),
    url('YOUR_IMAGE_LINK_HERE') center/cover no-repeat;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.card {
  font-size: 60px;
  animation: flip 2.5s ease;
}

@keyframes flip {
  0% { transform: rotateY(0deg) scale(0.5); }
  50% { transform: rotateY(180deg) scale(1.3); }
  100% { transform: rotateY(360deg) scale(1); }
}

.title {
  font-size: 30px;
  color: white;
  text-align: center;
  text-shadow: 0 0 20px #00ffcc;
}

/* APP */
#app {
  display: none;
  padding-bottom: 100px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 15px 0;
  border-top: 1px solid #ccc;
}

.nav div {
  cursor: pointer;
  color: #888;
}

.nav .active {
  color: #2962ff;
  font-weight: bold;
}

/* SECTIONS */
.section { display: none; }
.activeSection { display: block; }

/* SEARCH */
.search {
  padding: 15px;
}
.search input {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
}

/* LEAGUES */
.leagues {
  display: flex;
  overflow-x: auto;
  padding: 10px;
}
.league {
  padding: 14px 20px;
  margin-right: 10px;
  background: white;
  border-radius: 25px;
  font-weight: bold;
  cursor: pointer;
}
.activeLeague {
  background: #2962ff;
  color: white;
}

/* MATCH */
.match {
  background: white;
  margin: 15px;
  padding: 25px;
  border-radius: 18px;
  font-size: 18px;
  box-shadow: 0 6px 15px rgba(0,0,0,0.1);
}

.teams {
  font-size: 20px;
  font-weight: bold;
}

.pickRow {
  margin-top: 12px;
  display: flex;
  justify-content: space-between;
}

.pick {
  background: #e3f2fd;
  padding: 10px 14px;
  border-radius: 12px;
  cursor: pointer;
}

.selected {
  border: 2px solid #2962ff;
}

/* BUTTON */
button {
  width: 90%;
  margin: 20px;
  padding: 18px;
  border-radius: 14px;
  border: none;
  background: #2962ff;
  color: white;
  font-size: 18px;
}

/* RESULT */
.result {
  margin: 15px;
  padding: 20px;
  background: white;
  border-radius: 15px;
}

/* POPUP */
.popup {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 20px;
  display: none;
  border-radius: 20px 20px 0 0;
}

.option {
  padding: 15px;
  margin: 10px 0;
  background: #e3f2fd;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div>
    <div class="card">🃏</div>
    <div class="title">Tipster</div>
  </div>
</div>

<!-- APP -->
<div id="app">

<div id="home" class="section activeSection">

<div class="search">
  <input placeholder="Search..." oninput="searchMatch(this.value)">
</div>

<div class="leagues" id="leagueBar"></div>

<div id="matches"></div>

<button onclick="generateSlip()">Generate Slip</button>

</div>

<div id="picks" class="section">
  <div id="result" class="result"></div>
</div>

<div id="chat" class="section">
  <div class="result">💬 Coming soon</div>
</div>

<div id="bot" class="section">
  <div class="result">🤖 Coming soon</div>
</div>

</div>

<div class="nav">
  <div onclick="switchTab(this,'home')" class="active">🏠</div>
  <div onclick="switchTab(this,'picks')">📊</div>
  <div onclick="switchTab(this,'chat')">💬</div>
  <div onclick="switchTab(this,'bot')">🤖</div>
</div>

<div id="popup" class="popup"></div>

<script>

/* SPLASH */
setTimeout(()=>{
  splash.style.display="none";
  app.style.display="block";
},2500);

/* DATA */
const leagues=["All","Premier","La Liga"];
const allMatches=[
  {name:"Arsenal vs Chelsea",league:"Premier"},
  {name:"Barcelona vs Sevilla",league:"La Liga"},
  {name:"Bayern vs Dortmund",league:"All"}
];

let currentList=[...allMatches];

const leagueBar=document.getElementById("leagueBar");

leagues.forEach(l=>{
  let div=document.createElement("div");
  div.className="league";
  div.innerText=l;

  div.onclick=()=>{
    document.querySelectorAll(".league").forEach(x=>x.classList.remove("activeLeague"));
    div.classList.add("activeLeague");

    currentList = l==="All"?allMatches:allMatches.filter(m=>m.league===l);
    loadMatches(currentList);
  };

  leagueBar.appendChild(div);
});

/* LOAD */
function loadMatches(list){
  matches.innerHTML="";
  list.forEach(m=>{
    let defaultPick=getPrediction();
    let odds=(Math.random()*1+1.2).toFixed(2);

    let div=document.createElement("div");
    div.className="match";

    div.innerHTML=`
      <div class="teams">${m.name}</div>
      <div class="pickRow">
        <div class="pick" onclick="changeOption(this,event)">${defaultPick}</div>
        <div>${odds}</div>
      </div>
    `;

    div.onclick=()=>div.classList.toggle("selected");

    matches.appendChild(div);
  });
}

loadMatches(currentList);

/* SEARCH */
function searchMatch(val){
  loadMatches(currentList.filter(m=>m.name.toLowerCase().includes(val.toLowerCase())));
}

/* PREDICTION */
function getPrediction(){
  return ["Over 1.5","BTTS","Double Chance"][Math.floor(Math.random()*3)];
}

/* CHANGE OPTION */
function changeOption(el,e){
  e.stopPropagation();
  popup.style.display="block";
  popup.innerHTML="<b>Select Option</b>";

  ["Over 1.5","BTTS","Double Chance"].forEach(opt=>{
    let d=document.createElement("div");
    d.className="option";
    d.innerText=opt;
    d.onclick=()=>{
      el.innerText=opt;
      popup.style.display="none";
    };
    popup.appendChild(d);
  });
}

/* GENERATE */
function generateSlip(){
  let total=1;
  let html="<b>Slip</b><br><br>";

  document.querySelectorAll(".selected").forEach(m=>{
    let pick=m.querySelector(".pick").innerText;
    let odd=parseFloat(m.querySelector(".pickRow div:last-child").innerText);
    total*=odd;

    html+=`${m.querySelector(".teams").innerText} → ${pick} (${odd})<br>`;
  });

  html+=`<br><b>Total Odds: ${total.toFixed(2)}</b>`;
  result.innerHTML=html;

  switchTab(document.querySelectorAll(".nav div")[1],'picks');
}

/* NAV */
function switchTab(el,id){
  document.querySelectorAll(".nav div").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");

  document.querySelectorAll(".section").forEach(s=>s.classList.remove("activeSection"));
  document.getElementById(id).classList.add("activeSection");
}

</script>

</body>
</html>
