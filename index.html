<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tipster</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #f4f6f9, #dfe6ee);
}

header {
  text-align: center;
  padding: 15px;
  background: white;
  font-weight: bold;
}

.screen { display: none; padding-bottom: 80px; }
.active { display: block; }

.match {
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

.option {
  padding: 5px;
  margin: 5px 0;
  border-radius: 6px;
  cursor: pointer;
}
.option.selected {
  background: #d4edda;
  border: 1px solid green;
}

.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 15px;
}

.nav-btn { cursor: pointer; }
.active-tab { color: green; }

.chatbox {
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>🃏 TIPSTER</header>

<!-- MATCHES -->
<div id="matchesScreen" class="screen active">
  <p style="text-align:center;" id="loading">Loading matches...</p>
  <div id="matches"></div>
</div>

<!-- SLIP -->
<div id="slipScreen" class="screen">
  <div id="slip"></div>
</div>

<!-- CHAT -->
<div id="chatScreen" class="screen">
  <div class="chatbox">
    <input id="chatInput" placeholder="Ask something..." />
    <button onclick="chat()">Send</button>
    <div id="chatOutput"></div>
  </div>
</div>

<!-- NAV -->
<div class="navbar">
  <div class="nav-btn active-tab" onclick="show('matchesScreen', this)">Matches</div>
  <div class="nav-btn" onclick="show('slipScreen', this)">Slip</div>
  <div class="nav-btn" onclick="show('chatScreen', this)">Chat</div>
</div>

<script>

let selections = {};

// 🧠 FAKE API (SIMULATED RESPONSE)
function fetchMatches() {
  return new Promise(resolve => {
    setTimeout(() => {
      resolve([
        {home:"Arsenal", away:"Wolves"},
        {home:"Man City", away:"Liverpool"},
        {home:"Barcelona", away:"Sevilla"},
        {home:"Real Madrid", away:"Valencia"},
        {home:"Bayern", away:"Dortmund"},
        {home:"PSG", away:"Lyon"}
      ]);
    }, 1000);
  });
}

// TEAM DATA
const teams = {
  "Arsenal": 90,"Wolves":75,"Man City":95,"Liverpool":92,
  "Barcelona":89,"Sevilla":80,"Real Madrid":93,"Valencia":79,
  "Bayern":94,"Dortmund":86,"PSG":91,"Lyon":78
};

// LOAD MATCHES
async function loadMatches() {
  const data = await fetchMatches();
  document.getElementById("loading").style.display = "none";

  const container = document.getElementById("matches");

  data.forEach(m => {
    const game = `${m.home} vs ${m.away}`;

    const div = document.createElement("div");
    div.className = "match";
    div.innerHTML = `<b>${game}</b>`;

    const options = getOptions(game);

    options.forEach(opt => {
      const o = document.createElement("div");
      o.className = "option";
      o.innerText = `${opt.pick} (${opt.odds})`;

      o.onclick = () => {
        selections[game] = opt;
        document.querySelectorAll(`[data-game="${game}"]`).forEach(x=>x.classList.remove("selected"));
        o.classList.add("selected");
      };

      o.setAttribute("data-game", game);
      div.appendChild(o);
    });

    container.appendChild(div);
  });
}

// OPTIONS ENGINE
function getOptions(game) {
  const [home, away] = game.split(" vs ");
  const diff = (teams[home]||75)-(teams[away]||75);

  let ops = [];

  ops.push({pick:`${home} Over 0.5`,odds:1.25});
  ops.push({pick:"Over 1.5",odds:1.35});

  if(diff>5) ops.push({pick:`${home} Double Chance`,odds:1.40});
  if(Math.abs(diff)<5) ops.push({pick:"BTTS",odds:1.60});
  if(diff>8) ops.push({pick:`${home} Win`,odds:1.75});

  return ops;
}

// NAV
function show(id,el){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active-tab"));
  el.classList.add("active-tab");

  if(id==="slipScreen") updateSlip();
}

// SLIP
function updateSlip(){
  let html="<h3>📋 YOUR SLIP</h3>";
  let total=1;

  Object.keys(selections).forEach(game=>{
    let s=selections[game];
    total*=s.odds;
    html+=`<b>${game}</b><br>${s.pick} (${s.odds})<br><br>`;
  });

  html+=`<hr><b>Total Odds: ${total.toFixed(2)}</b>`;
  document.getElementById("slip").innerHTML=html;
}

// AI
function chat(){
  let q=document.getElementById("chatInput").value;
  document.getElementById("chatOutput").innerHTML=`AI: Focus on safer bets like Over 1.5`;
}

// INIT
loadMatches();

</script>

</body>
</html>
