<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tipster</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f2f6ff;
}

/* SPLASH */
#splash {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: linear-gradient(135deg, #1a0033, #3a0ca3, #720026);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.logo {
  font-size: 48px;
  color: white;
  animation: flipZoom 2.5s ease;
}

@keyframes flipZoom {
  0% { transform: rotateY(0deg) scale(0.5); opacity: 0; }
  50% { transform: rotateY(180deg) scale(1.4); opacity: 1; }
  100% { transform: rotateY(360deg) scale(1); }
}

/* APP */
#app {
  display: none;
  padding-bottom: 90px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 15px 0;
  border-top: 1px solid #ccc;
}

.nav div {
  font-size: 14px;
  text-align: center;
  cursor: pointer;
  color: #888;
}

.nav .active {
  color: #2962ff;
  font-weight: bold;
}

/* SECTIONS */
.section { display: none; }
.activeSection { display: block; }

/* SEARCH */
.search {
  padding: 15px;
}

.search input {
  width: 100%;
  padding: 16px;
  border-radius: 14px;
  border: none;
  font-size: 16px;
}

/* LEAGUES */
.leagues {
  display: flex;
  overflow-x: auto;
  padding: 10px;
}

.league {
  background: white;
  padding: 12px 18px;
  margin-right: 10px;
  border-radius: 20px;
  font-size: 14px;
  font-weight: bold;
  cursor: pointer;
}

.league.activeLeague {
  background: #2962ff;
  color: white;
}

/* MATCH CARD */
.match {
  background: white;
  margin: 10px;
  padding: 18px;
  border-radius: 14px;
}

.teams {
  font-size: 17px;
  font-weight: bold;
}

.pick {
  margin-top: 10px;
  display: flex;
  justify-content: space-between;
}

.pick span {
  background: #e3f2fd;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
}

.selected {
  border: 2px solid #2962ff;
}

/* BUTTON */
button {
  width: 90%;
  margin: 20px;
  padding: 18px;
  border-radius: 14px;
  border: none;
  background: #2962ff;
  color: white;
  font-size: 18px;
}

/* RESULT */
.result {
  padding: 15px;
  margin: 10px;
  background: white;
  border-radius: 14px;
}

/* POPUP */
.popup {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 20px;
  display: none;
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
}

.option {
  padding: 15px;
  margin: 10px 0;
  background: #e3f2fd;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="splash">
  <div class="logo">🃏 Tipster</div>
</div>

<div id="app">

<!-- HOME -->
<div id="home" class="section activeSection">

<div class="search">
  <input placeholder="Search teams..." oninput="searchMatch(this.value)">
</div>

<div class="leagues" id="leagueBar"></div>

<div id="matches"></div>

<button onclick="generateSlip()">Generate Slip</button>

</div>

<!-- PICKS -->
<div id="picks" class="section">
  <div id="result" class="result"></div>
</div>

<!-- CHAT -->
<div id="chat" class="section">
  <div class="result">💬 Coming soon</div>
</div>

<!-- BOT -->
<div id="bot" class="section">
  <div class="result">🤖 Coming soon</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <div onclick="switchTab(this,'home')" class="active">🏠 Home</div>
  <div onclick="switchTab(this,'picks')">📊 Picks</div>
  <div onclick="switchTab(this,'chat')">💬 Chat</div>
  <div onclick="switchTab(this,'bot')">🤖 Bot</div>
</div>

<div id="popup" class="popup"></div>

<script>

/* SPLASH */
setTimeout(()=>{
  splash.style.display="none";
  app.style.display="block";
},2500);

/* DATA */
const leagues = ["All","Premier","La Liga"];

const allMatches = [
  {name:"Arsenal vs Chelsea", league:"Premier"},
  {name:"Man City vs Liverpool", league:"Premier"},
  {name:"Barcelona vs Sevilla", league:"La Liga"},
  {name:"Real Madrid vs Valencia", league:"La Liga"}
];

let currentList=[...allMatches];

/* LOAD LEAGUES */
const leagueBar=document.getElementById("leagueBar");

leagues.forEach(l=>{
  const div=document.createElement("div");
  div.className="league";
  div.innerText=l;

  div.onclick=()=>{
    document.querySelectorAll(".league").forEach(x=>x.classList.remove("activeLeague"));
    div.classList.add("activeLeague");

    currentList = l==="All" ? allMatches : allMatches.filter(m=>m.league===l);
    loadMatches(currentList);
  };

  leagueBar.appendChild(div);
});

/* LOAD MATCHES */
function loadMatches(list){
  matches.innerHTML="";
  list.forEach(m=>{
    let pick=getPrediction();
    let odds=(Math.random()*1+1.2).toFixed(2);

    const div=document.createElement("div");
    div.className="match";

    div.innerHTML=`
      <div class="teams">${m.name}</div>
      <div class="pick">
        <span onclick="changeOption(this,event)">${pick}</span>
        <span>${odds}</span>
      </div>
    `;

    div.onclick=()=>div.classList.toggle("selected");

    matches.appendChild(div);
  });
}

loadMatches(currentList);

/* SEARCH */
function searchMatch(val){
  const filtered = currentList.filter(m=>m.name.toLowerCase().includes(val.toLowerCase()));
  loadMatches(filtered);
}

/* PREDICTION */
function getPrediction(){
  const options=["Over 1.5","BTTS","Double Chance"];
  return options[Math.floor(Math.random()*options.length)];
}

/* CHANGE OPTION */
function changeOption(el,e){
  e.stopPropagation();
  const popup=document.getElementById("popup");
  popup.style.display="block";
  popup.innerHTML="<b>Select Option</b>";

  ["Over 1.5","BTTS","Double Chance"].forEach(opt=>{
    const d=document.createElement("div");
    d.className="option";
    d.innerText=opt;
    d.onclick=()=>{
      el.innerText=opt;
      popup.style.display="none";
    };
    popup.appendChild(d);
  });
}

/* GENERATE SLIP */
function generateSlip(){
  let total=1;
  let html="<b>Slip</b><br><br>";

  document.querySelectorAll(".selected").forEach(m=>{
    let pick=m.querySelector(".pick span").innerText;
    let odd=parseFloat(m.querySelectorAll(".pick span")[1].innerText);
    total*=odd;

    html+=`${m.querySelector(".teams").innerText} → ${pick} (${odd})<br>`;
  });

  html+=`<br><b>Total Odds: ${total.toFixed(2)}</b>`;
  result.innerHTML=html;

  switchTab(document.querySelectorAll(".nav div")[1],'picks');
}

/* NAV */
function switchTab(el,id){
  document.querySelectorAll(".nav div").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");

  document.querySelectorAll(".section").forEach(s=>s.classList.remove("activeSection"));
  document.getElementById(id).classList.add("activeSection");
}

</script>

</body>
</html>
