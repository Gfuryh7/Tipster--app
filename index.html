<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tipster</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at top, #0a0f2c, #000);
  color: white;
  display: flex;
  flex-direction: column;
  align-items: center;
}

header {
  padding: 25px;
  font-size: 28px;
  font-weight: bold;
}

.matches {
  width: 90%;
  max-width: 500px;
}

.match {
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding: 15px;
  margin-bottom: 12px;
  border-radius: 12px;
  text-align: center;
  cursor: pointer;
  transition: 0.3s;
}

.match:hover {
  transform: scale(1.02);
}

.selected {
  border: 2px solid #00ff99;
}

button {
  width: 90%;
  max-width: 500px;
  padding: 15px;
  margin: 20px;
  background: #00ff99;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

.result {
  width: 90%;
  max-width: 500px;
  background: #111;
  padding: 15px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>🃏 TIPSTER</header>

<div class="matches" id="matches"></div>

<button onclick="generateSlip()">Generate Smart Slip</button>

<div class="result" id="result"></div>

<script>

// 🔥 TEAM STRENGTH (simulated stats)
const teams = {
  "Man City": 95,
  "Arsenal": 90,
  "Liverpool": 92,
  "Chelsea": 82,
  "Barcelona": 89,
  "Real Madrid": 93,
  "Sevilla": 80,
  "Bayern": 94,
  "Dortmund": 86,
  "PSG": 91,
  "Lyon": 78,
  "Wolves": 75,
  "Valencia": 79
};

// 🌍 MATCHES
const matches = [
  { league: "EPL", game: "Arsenal vs Wolves" },
  { league: "EPL", game: "Man City vs Liverpool" },
  { league: "La Liga", game: "Barcelona vs Sevilla" },
  { league: "La Liga", game: "Real Madrid vs Valencia" },
  { league: "Bundesliga", game: "Bayern vs Dortmund" },
  { league: "UCL", game: "PSG vs Bayern" }
];

const container = document.getElementById("matches");

matches.forEach(m => {
  const div = document.createElement("div");
  div.className = "match";
  div.innerText = `${m.league} • ${m.game}`;
  div.onclick = () => div.classList.toggle("selected");
  container.appendChild(div);
});

// 🧠 SMART ENGINE WITH MULTIPLE OPTIONS
function predict(matchText) {
  const game = matchText.split("• ")[1];
  const [home, away] = game.split(" vs ");

  const h = teams[home] || 75;
  const a = teams[away] || 75;
  const diff = h - a;

  let options = [];

  // SAFEST OPTIONS
  options.push({
    type: "SAFE",
    pick: `${home} Over 0.5 Goals`,
    reason: `${home} likely to score at least once`
  });

  options.push({
    type: "SAFE",
    pick: "Over 1.5 Goals",
    reason: "Most matches exceed 1 goal"
  });

  // MEDIUM RISK
  if (diff > 5) {
    options.push({
      type: "MEDIUM",
      pick: `${home} Double Chance`,
      reason: `${home} unlikely to lose`
    });
  }

  if (Math.abs(diff) < 5) {
    options.push({
      type: "MEDIUM",
      pick: "Both Teams To Score",
      reason: "Teams are evenly matched"
    });
  }

  // HIGHER RISK
  if (diff > 8) {
    options.push({
      type: "RISKY",
      pick: `${home} Win`,
      reason: `${home} clearly stronger`
    });
  }

  if (diff < -8) {
    options.push({
      type: "RISKY",
      pick: `${away} Win`,
      reason: `${away} stronger side`
    });
  }

  return options;
}

// 🎯 GENERATE SLIP
function generateSlip() {
  const selected = document.querySelectorAll(".selected");

  if (selected.length === 0) {
    alert("Select matches first");
    return;
  }

  let html = "<h3>📋 SMART BET OPTIONS</h3>";

  selected.forEach(m => {
    const options = predict(m.innerText);

    html += `<div style="margin-bottom:15px;">`;
    html += `<b>${m.innerText}</b><br>`;

    options.forEach(opt => {
      html += `
        <div style="margin:5px 0;">
          <span style="color:#00ff99;">[${opt.type}]</span> 
          ${opt.pick}<br>
          <small>${opt.reason}</small>
        </div>
      `;
    });

    html += `</div>`;
  });

  document.getElementById("result").innerHTML = html;
}

</script>

</body>
</html>
