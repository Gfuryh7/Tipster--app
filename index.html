<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tipster</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f9ff;
}

/* SPLASH */
#splash {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: linear-gradient(135deg, #1a0033, #3a0ca3, #720026);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.logo {
  font-size: 45px;
  color: white;
  animation: flipZoom 2.5s ease;
}

@keyframes flipZoom {
  0% { transform: rotateY(0deg) scale(0.5); opacity: 0; }
  50% { transform: rotateY(180deg) scale(1.3); opacity: 1; }
  100% { transform: rotateY(360deg) scale(1); }
}

/* APP */
#app {
  display: none;
  padding-bottom: 90px;
}

/* SEARCH */
.search {
  padding: 15px;
}

.search input {
  width: 100%;
  padding: 15px;
  border-radius: 12px;
  border: none;
  font-size: 16px;
  background: white;
}

/* LEAGUES */
.leagues {
  display: flex;
  overflow-x: auto;
  padding: 10px;
}

.league {
  background: white;
  padding: 10px 15px;
  margin-right: 10px;
  border-radius: 10px;
  white-space: nowrap;
}

/* MATCH CARD */
.match {
  background: white;
  margin: 12px;
  padding: 20px;
  border-radius: 15px;
  font-size: 18px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

.selected {
  border: 3px solid #2962ff;
  background: #e3f2fd;
}

/* BUTTON */
button {
  width: 90%;
  margin: 20px;
  padding: 18px;
  border-radius: 12px;
  border: none;
  background: #2962ff;
  color: white;
  font-size: 18px;
}

/* RESULT */
.result {
  margin: 15px;
  padding: 20px;
  background: white;
  border-radius: 15px;
  font-size: 16px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 15px 0;
  font-size: 16px;
  border-top: 1px solid #ccc;
}

/* POPUP */
.popup {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  padding: 20px;
  display: none;
  border-top-left-radius: 20px;
  border-top-right-radius: 20px;
}

.option {
  padding: 15px;
  margin: 10px 0;
  background: #e3f2fd;
  border-radius: 10px;
}
</style>
</head>

<body>

<div id="splash">
  <div class="logo">🃏 Tipster</div>
</div>

<div id="app">

<!-- SEARCH -->
<div class="search">
  <input type="text" placeholder="Search team..." oninput="searchMatch(this.value)">
</div>

<!-- LEAGUES -->
<div class="leagues">
  <div class="league">Premier League</div>
  <div class="league">La Liga</div>
  <div class="league">Bundesliga</div>
  <div class="league">Serie A</div>
</div>

<!-- MATCHES -->
<div id="matches"></div>

<button onclick="generateSlip()">Generate Slip</button>

<!-- RESULT -->
<div id="result" class="result"></div>

</div>

<!-- NAV -->
<div class="nav">
  <div>🏠 Home</div>
  <div>📊 Picks</div>
  <div>💬 Chat</div>
  <div>🤖 Bot</div>
</div>

<!-- POPUP -->
<div id="popup" class="popup"></div>

<script>

/* SPLASH */
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
  document.getElementById("app").style.display="block";
},2500);

/* MATCH DATA */
const matches = [
  "Arsenal vs Chelsea",
  "Barcelona vs Sevilla",
  "Bayern vs Dortmund",
  "Man City vs Liverpool",
  "PSG vs Lyon"
];

const container = document.getElementById("matches");

function loadMatches(list){
  container.innerHTML="";
  list.forEach(match=>{
    const div=document.createElement("div");
    div.className="match";
    div.innerText=match;
    div.onclick=()=>div.classList.toggle("selected");
    container.appendChild(div);
  });
}

loadMatches(matches);

/* SEARCH */
function searchMatch(val){
  const filtered = matches.filter(m => m.toLowerCase().includes(val.toLowerCase()));
  loadMatches(filtered);
}

/* SLIP */
function generateSlip(){
  const selected=document.querySelectorAll(".selected");
  let total=1;
  let html="<b>Tipster Slip</b><br><br>";

  selected.forEach(m=>{
    let odds=(Math.random()*1+1.2).toFixed(2);
    total*=odds;

    html+=`<div onclick="changeOption(this)">
      ${m.innerText} → Pick (${odds})
    </div>`;
  });

  html+=`<br><b>Total Odds: ${total.toFixed(2)}</b>`;
  document.getElementById("result").innerHTML=html;
}

/* CHANGE OPTION */
function changeOption(el){
  const popup=document.getElementById("popup");
  popup.style.display="block";

  const options=[
    "Over 1.5 Goals",
    "Double Chance",
    "BTTS"
  ];

  popup.innerHTML="<b>Change Option</b>";

  options.forEach(opt=>{
    const div=document.createElement("div");
    div.className="option";
    div.innerText=opt;
    div.onclick=()=>{
      el.innerHTML = el.innerHTML.split("→")[0] + "→ " + opt;
      popup.style.display="none";
    };
    popup.appendChild(div);
  });
}

</script>

</body>
</html>
