<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tipster</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(to bottom, #f4f6f9, #dfe6ee);
}

/* HEADER */
header {
  text-align: center;
  padding: 15px;
  font-weight: bold;
  background: white;
}

/* SCREENS */
.screen { display: none; padding-bottom: 80px; }
.active { display: block; }

/* MATCH */
.match {
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}

/* OPTIONS */
.option {
  padding: 5px;
  margin: 5px 0;
  border-radius: 6px;
  cursor: pointer;
}
.option.selected {
  background: #d4edda;
  border: 1px solid green;
}

/* BUTTON */
button {
  width: 90%;
  margin: 10px auto;
  display: block;
  padding: 12px;
  background: green;
  color: white;
  border: none;
  border-radius: 8px;
}

/* NAVBAR */
.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 15px;
}
.nav-btn { cursor: pointer; }
.active-tab { color: green; }

/* CHAT */
.chatbox {
  background: white;
  margin: 10px;
  padding: 10px;
  border-radius: 10px;
}
</style>
</head>

<body>

<header>🃏 TIPSTER</header>

<!-- MATCHES -->
<div id="matchesScreen" class="screen active">
  <input id="targetOdds" placeholder="Target odds (e.g. 5)" />
  <div id="matches"></div>
  <button onclick="goToSlip()">View Slip</button>
</div>

<!-- SLIP -->
<div id="slipScreen" class="screen">
  <div id="slip"></div>
</div>

<!-- CHAT -->
<div id="chatScreen" class="screen">
  <div class="chatbox">
    <p><b>AI:</b> Ask me about your bets 👇</p>
    <input id="chatInput" placeholder="Type question..." />
    <button onclick="chat()">Send</button>
    <div id="chatOutput"></div>
  </div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-btn active-tab" onclick="show('matchesScreen', this)">Matches</div>
  <div class="nav-btn" onclick="show('slipScreen', this)">Slip</div>
  <div class="nav-btn" onclick="show('chatScreen', this)">Chat</div>
</div>

<script>

// DATA
const teams = {
  "Arsenal": 90,"Wolves":75,"Man City":95,"Liverpool":92,
  "Barcelona":89,"Sevilla":80,"Real Madrid":93,"Valencia":79,
  "Bayern":94,"Dortmund":86,"PSG":91,"Lyon":78
};

const games = [
  "Arsenal vs Wolves","Man City vs Liverpool",
  "Barcelona vs Sevilla","Real Madrid vs Valencia",
  "Bayern vs Dortmund","PSG vs Lyon"
];

let selections = {};

// DISPLAY MATCHES
const container = document.getElementById("matches");

games.forEach(game => {
  const div = document.createElement("div");
  div.className = "match";

  const title = `<b>${game}</b><br>`;
  div.innerHTML = title;

  const options = getOptions(game);

  options.forEach(opt => {
    const o = document.createElement("div");
    o.className = "option";
    o.innerText = `${opt.pick} (${opt.odds})`;

    o.onclick = () => {
      selections[game] = opt;
      document.querySelectorAll(`[data-game="${game}"]`).forEach(x=>x.classList.remove("selected"));
      o.classList.add("selected");
    };

    o.setAttribute("data-game", game);
    div.appendChild(o);
  });

  container.appendChild(div);
});

// OPTIONS ENGINE
function getOptions(game) {
  const [home, away] = game.split(" vs ");
  const diff = (teams[home]||75)-(teams[away]||75);

  let ops = [];

  ops.push({pick:`${home} Over 0.5`,odds:1.25});
  ops.push({pick:"Over 1.5",odds:1.35});

  if(diff>5) ops.push({pick:`${home} Double Chance`,odds:1.40});
  if(Math.abs(diff)<5) ops.push({pick:"BTTS",odds:1.60});
  if(diff>8) ops.push({pick:`${home} Win`,odds:1.75});

  return ops;
}

// NAV
function show(id,el){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  document.querySelectorAll(".nav-btn").forEach(b=>b.classList.remove("active-tab"));
  el.classList.add("active-tab");

  if(id==="slipScreen") updateSlip();
}

// SLIP
function goToSlip(){
  show("slipScreen", document.querySelectorAll(".nav-btn")[1]);
}

function updateSlip(){
  let html="<h3>📋 YOUR SLIP</h3>";
  let total=1;

  Object.keys(selections).forEach(game=>{
    let s=selections[game];
    total*=s.odds;

    html+=`<b>${game}</b><br>${s.pick} (${s.odds})<br><br>`;
  });

  html+=`<hr><b>Total Odds: ${total.toFixed(2)}</b>`;
  document.getElementById("slip").innerHTML=html;
}

// AI CHAT
function chat(){
  let q=document.getElementById("chatInput").value;
  let res="";

  if(q.includes("safe")) res="Pick Over 1.5 or Double Chance";
  else if(q.includes("win")) res="Stronger team has higher probability";
  else res="Focus on low-risk markets";

  document.getElementById("chatOutput").innerHTML=`<p><b>AI:</b> ${res}</p>`;
}

</script>

</body>
</html>
