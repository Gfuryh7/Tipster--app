<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tipster</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f9ff;
}

/* SPLASH */
#splash {
  position: fixed;
  width: 100%;
  height: 100vh;
  background:
    linear-gradient(135deg, rgba(26,0,51,0.85), rgba(58,12,163,0.85));
  display: flex;
  justify-content: center;
  align-items: center;
  color: white;
  font-size: 30px;
  z-index: 9999;
}

/* APP */
#app {
  display: none;
  padding-bottom: 120px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
  border-top: 1px solid #ccc;
}

.nav div {
  text-align: center;
  font-size: 13px;
  cursor: pointer;
}

.nav div span {
  display: block;
  font-size: 22px;
}

.active {
  color: #2962ff;
}

/* SEARCH */
.search input {
  width: 90%;
  margin: 15px;
  padding: 15px;
  border-radius: 14px;
  border: none;
}

/* TARGET */
.targetBox {
  margin: 10px 15px;
  padding: 15px;
  background: white;
  border-radius: 15px;
}

/* LEAGUES */
.leagues {
  display: flex;
  overflow-x: auto;
  padding: 10px;
}

.league {
  padding: 10px 18px;
  background: white;
  margin-right: 10px;
  border-radius: 20px;
  cursor: pointer;
}

.activeLeague {
  background: #2962ff;
  color: white;
}

/* MATCH */
.match {
  background: white;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
}

.selected {
  border: 2px solid #2962ff;
}

.pick {
  background: #e3f2fd;
  padding: 8px 12px;
  border-radius: 10px;
  cursor: pointer;
}

/* BUTTON */
button {
  width: 90%;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: #2962ff;
  color: white;
}

/* POPUP */
.popup {
  position: fixed;
  bottom: -300px;
  width: 100%;
  background: white;
  padding: 20px;
  border-radius: 20px 20px 0 0;
  transition: 0.3s;
}

.popup.show {
  bottom: 0;
}

/* RESULT */
.result {
  margin: 15px;
  padding: 15px;
  background: white;
  border-radius: 15px;
}

.warning {
  color: red;
}
</style>
</head>

<body>

<div id="splash">Tipster</div>

<div id="app">

<div id="home" class="section activeSection">

<div class="search">
<input placeholder="Search team..." oninput="searchMatch(this.value)">
</div>

<div class="targetBox">
🎯 Target Odds:
<input id="targetOdds" type="number" placeholder="e.g. 5">
<div id="riskWarning" class="warning"></div>
</div>

<div class="leagues" id="leagueBar"></div>

<div id="matches"></div>

<button onclick="generateSlip()">Generate Slip</button>
<button onclick="smartGenerate()">🧠 Smart Slip</button>

</div>

<div id="picks" class="section">
<div id="result" class="result"></div>
</div>

</div>

<div class="nav">
<div onclick="switchTab(this,'home')" class="active"><span>🏠</span>Home</div>
<div onclick="switchTab(this,'picks')"><span>📊</span>Slip</div>
</div>

<div id="popup" class="popup"></div>

<script>

/* ELEMENTS */
const splash = document.getElementById("splash");
const app = document.getElementById("app");
const matches = document.getElementById("matches");
const popup = document.getElementById("popup");

/* SPLASH */
setTimeout(()=>{
  splash.style.display="none";
  app.style.display="block";
},2000);

/* DATA */
const leagues=["All","Premier","La Liga"];

const allMatches=[
  {id:1,name:"Arsenal vs Chelsea",league:"Premier"},
  {id:2,name:"Barcelona vs Sevilla",league:"La Liga"},
  {id:3,name:"Bayern vs Dortmund",league:"All"}
];

const options=[
  {name:"Over 1.5",risk:1},
  {name:"Double Chance",risk:2},
  {name:"BTTS",risk:3}
];

let state={};
let currentList=[...allMatches];

/* INIT */
allMatches.forEach(m=>{
  state[m.id]={
    pick:options[0],
    odds:(Math.random()*1+1.2).toFixed(2),
    selected:false
  };
});

/* LEAGUES */
const leagueBar=document.getElementById("leagueBar");

leagues.forEach(l=>{
  let div=document.createElement("div");
  div.className="league";
  div.innerText=l;

  div.onclick=()=>{
    document.querySelectorAll(".league").forEach(x=>x.classList.remove("activeLeague"));
    div.classList.add("activeLeague");

    currentList = l==="All"?allMatches:allMatches.filter(m=>m.league===l);
    loadMatches(currentList);
  };

  leagueBar.appendChild(div);
});

/* LOAD */
function loadMatches(list){
  matches.innerHTML="";

  list.forEach(m=>{
    let s=state[m.id];

    let div=document.createElement("div");
    div.className="match";
    if(s.selected) div.classList.add("selected");

    div.innerHTML=`
      <b>${m.name}</b><br><br>
      <span class="pick">${s.pick.name}</span> | ${s.odds}
    `;

    div.onclick=()=>{
      s.selected=!s.selected;
      div.classList.toggle("selected");
    };

    div.querySelector(".pick").onclick=(e)=>{
      e.stopPropagation();
      openPopup(s,div.querySelector(".pick"));
    };

    matches.appendChild(div);
  });
}

loadMatches(currentList);

/* POPUP */
function openPopup(stateObj,el){
  popup.classList.add("show");
  popup.innerHTML="<b>Select Option</b>";

  options.forEach(opt=>{
    let d=document.createElement("div");
    d.innerText=opt.name;
    d.className="pick";

    d.onclick=()=>{
      stateObj.pick=opt;
      el.innerText=opt.name;
      popup.classList.remove("show");
    };

    popup.appendChild(d);
  });
}

/* SEARCH */
function searchMatch(val){
  loadMatches(currentList.filter(m=>m.name.toLowerCase().includes(val.toLowerCase())));
}

/* NORMAL SLIP */
function generateSlip(){
  let total=1;
  let count=0;
  let html="<b>Slip</b><br><br>";

  allMatches.forEach(m=>{
    let s=state[m.id];
    if(s.selected){
      total*=s.odds;
      count++;
      html+=`${m.name} → ${s.pick.name} (${s.odds})<br>`;
    }
  });

  if(count===0){
    result.innerHTML="⚠️ No selections yet";
    return;
  }

  html+=`<br><b>Total Odds: ${total.toFixed(2)}</b>`;
  result.innerHTML=html;
  switchTab(document.querySelectorAll(".nav div")[1],'picks');
}

/* 🧠 SMART LOGIC */
function smartGenerate(){
  let target=parseFloat(targetOdds.value) || 3;

  // select all matches
  allMatches.forEach(m=>{
    state[m.id].selected=true;
    state[m.id].pick=options[0]; // safe
  });

  let total=calcTotal();

  // increase risk gradually
  for(let m of allMatches){
    if(total >= target) break;

    let s=state[m.id];
    let i=options.indexOf(s.pick);

    if(i < options.length-1){
      s.pick=options[i+1];
      total=calcTotal();
    }
  }

  loadMatches(currentList);
  generateSlip();
}

/* CALC */
function calcTotal(){
  let t=1;
  allMatches.forEach(m=>{
    if(state[m.id].selected){
      t*=state[m.id].odds;
    }
  });
  return t;
}

/* NAV */
function switchTab(el,id){
  document.querySelectorAll(".nav div").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");

  document.querySelectorAll(".section").forEach(s=>s.classList.remove("activeSection"));
  document.getElementById(id).classList.add("activeSection");
}

</script>

</body>
</html>
