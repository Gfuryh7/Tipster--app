<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tipster</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f9ff;
}

/* SPLASH */
#splash {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: linear-gradient(135deg, #1a0033, #3a0ca3);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  z-index: 9999;
}

.card {
  font-size: 60px;
  animation: flip 2s ease;
}

@keyframes flip {
  0% { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}

/* APP */
#app {
  display: none;
  padding-bottom: 120px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: white;
  border-top: 1px solid #ccc;
}

.nav div {
  flex: 1;
  text-align: center;
  padding: 10px;
}

.nav span {
  display: block;
  font-size: 22px;
}

.active {
  color: #2962ff;
}

/* SEARCH */
.search input {
  width: 92%;
  margin: 15px;
  padding: 18px;
  font-size: 16px;
  border-radius: 14px;
}

/* TARGET */
.targetBox {
  margin: 10px 15px;
  padding: 15px;
  background: white;
  border-radius: 15px;
}

.targetBox input {
  width: 100%;
  padding: 15px;
  font-size: 16px;
  border-radius: 10px;
}

/* MATCH */
.match {
  background: white;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
}

.selected {
  border: 2px solid #2962ff;
}

.pick {
  background: #e3f2fd;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

/* RESULT */
.result {
  margin: 15px;
  padding: 20px;
  background: white;
  border-radius: 15px;
}

/* BUTTON */
button {
  width: 90%;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: #2962ff;
  color: white;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="card">🃏</div>
  <div>Tipster</div>
</div>

<div id="app">

<!-- HOME -->
<div id="home" class="section activeSection">

<div class="search">
<input placeholder="Search team..." oninput="searchMatch(this.value)">
</div>

<div class="targetBox">
🎯 Target Odds
<input id="targetOdds" placeholder="e.g. 5.0">
</div>

<div id="matches"></div>

<button onclick="generateSlip()">Generate Slip</button>
<button onclick="smartGenerate()">🧠 Smart Slip</button>

</div>

<!-- SLIP -->
<div id="picks" class="section">
<div id="result" class="result"></div>
</div>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="switchTab(this,'home')" class="active"><span>🏠</span>Home</div>
<div onclick="switchTab(this,'picks')"><span>📊</span>Slip</div>
</div>

<script>

/* SPLASH */
setTimeout(()=>{
  splash.style.display="none";
  app.style.display="block";
},2000);

/* DATA */
const options=[
  {name:"Over 1.5",risk:1},
  {name:"Double Chance",risk:2},
  {name:"BTTS",risk:3}
];

const matchesData=[
  {id:1,name:"Arsenal vs Chelsea"},
  {id:2,name:"Barcelona vs Sevilla"},
  {id:3,name:"Bayern vs Dortmund"}
];

let state={};

matchesData.forEach(m=>{
  state[m.id]={
    pick:options[0],
    odds:(Math.random()*1+1.2).toFixed(2),
    selected:false
  };
});

/* LOAD */
function loadMatches(list){
  matches.innerHTML="";

  list.forEach(m=>{
    let s=state[m.id];

    let div=document.createElement("div");
    div.className="match";
    if(s.selected) div.classList.add("selected");

    div.innerHTML=`
      <b>${m.name}</b><br><br>
      <span class="pick">${s.pick.name}</span> | ${s.odds}
    `;

    div.onclick=()=>{
      s.selected=!s.selected;
      div.classList.toggle("selected");
    };

    div.querySelector(".pick").onclick=(e)=>{
      e.stopPropagation();
      let i=options.indexOf(s.pick);
      s.pick=options[(i+1)%options.length];
      loadMatches(matchesData);
    };

    matches.appendChild(div);
  });
}

loadMatches(matchesData);

/* SEARCH */
function searchMatch(val){
  loadMatches(matchesData.filter(m=>m.name.toLowerCase().includes(val.toLowerCase())));
}

/* GENERATE */
function generateSlip(){
  let total=1;
  let count=0;
  let html="<b>Slip</b><br><br>";

  matchesData.forEach(m=>{
    let s=state[m.id];
    if(s.selected){
      total*=s.odds;
      count++;
      html+=`${m.name} → ${s.pick.name} (${s.odds})<br>`;
    }
  });

  if(count===0){
    html="⚠️ No selections yet";
  } else {
    html+=`<br><b>Total Odds: ${total.toFixed(2)}</b>`;
  }

  result.innerHTML=html;

  // 🔥 AUTO NAVIGATE BACK
  switchTab(document.querySelectorAll(".nav div")[1],'picks');
}

/* SMART */
function smartGenerate(){
  let target=parseFloat(targetOdds.value) || 3;

  matchesData.forEach(m=>{
    state[m.id].selected=true;
    state[m.id].pick=options[0];
  });

  let total=calcTotal();

  for(let m of matchesData){
    if(total >= target) break;

    let s=state[m.id];
    let i=options.indexOf(s.pick);

    if(i < options.length-1){
      s.pick=options[i+1];
      total=calcTotal();
    }
  }

  loadMatches(matchesData);
  generateSlip();
}

/* CALC */
function calcTotal(){
  let t=1;
  matchesData.forEach(m=>{
    if(state[m.id].selected){
      t*=state[m.id].odds;
    }
  });
  return t;
}

/* NAV */
function switchTab(el,id){
  document.querySelectorAll(".nav div").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");

  document.querySelectorAll(".section").forEach(s=>s.classList.remove("activeSection"));
  document.getElementById(id).classList.add("activeSection");
}

</script>

</body>
</html>
