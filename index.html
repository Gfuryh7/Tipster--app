<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tipster</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #f5f9ff;
}

/* SPLASH */
#splash {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: linear-gradient(135deg, #1a0033, #3a0ca3);
  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  color: white;
  z-index: 9999;
}

.card {
  font-size: 60px;
  animation: flip 2s ease;
}

@keyframes flip {
  0% { transform: rotateY(0deg); }
  100% { transform: rotateY(360deg); }
}

/* APP */
#app {
  display: none;
  padding-bottom: 120px;
}

/* NAV */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: white;
  border-top: 1px solid #ccc;
}

.nav div {
  flex: 1;
  text-align: center;
  padding: 10px;
  cursor: pointer;
}

.nav span {
  display: block;
  font-size: 22px;
}

.active {
  color: #2962ff;
}

/* SECTIONS */
.section { display: none; }
.activeSection { display: block; }

/* SEARCH */
.search input {
  width: 92%;
  margin: 15px;
  padding: 18px;
  font-size: 16px;
  border-radius: 14px;
  border: none;
}

/* TARGET */
.targetBox {
  margin: 10px 15px;
  padding: 15px;
  background: white;
  border-radius: 15px;
}

.targetBox input {
  width: 100%;
  padding: 15px;
  font-size: 16px;
  border-radius: 10px;
}

/* LEAGUES */
.leagues {
  display: flex;
  overflow-x: auto;
  padding: 10px;
}

.league {
  padding: 10px 18px;
  background: white;
  margin-right: 10px;
  border-radius: 20px;
  cursor: pointer;
}

.activeLeague {
  background: #2962ff;
  color: white;
}

/* MATCH */
.match {
  background: white;
  margin: 15px;
  padding: 20px;
  border-radius: 15px;
}

.selected {
  border: 2px solid #2962ff;
}

.pick {
  background: #e3f2fd;
  padding: 10px;
  border-radius: 10px;
  cursor: pointer;
}

/* BUTTON */
button {
  width: 90%;
  margin: 10px;
  padding: 15px;
  border-radius: 12px;
  border: none;
  background: #2962ff;
  color: white;
}

/* RESULT */
.result {
  margin: 15px;
  padding: 15px;
  background: white;
  border-radius: 15px;
}

/* POPUP */
.popup {
  position: fixed;
  bottom: -300px;
  width: 100%;
  background: white;
  padding: 20px;
  border-radius: 20px 20px 0 0;
  transition: 0.3s;
}

.popup.show {
  bottom: 0;
}

.option {
  padding: 15px;
  margin: 10px 0;
  background: #e3f2fd;
  border-radius: 10px;
  cursor: pointer;
}
</style>
</head>

<body>

<div id="splash">
  <div class="card">🃏</div>
  <div>Tipster</div>
</div>

<div id="app">

<!-- HOME -->
<div id="home" class="section activeSection">

<div class="search">
<input placeholder="Search team..." oninput="searchMatch(this.value)">
</div>

<div class="targetBox">
🎯 Target Odds
<input id="targetOdds" placeholder="e.g. 7">
</div>

<div class="leagues" id="leagueBar"></div>

<div id="matches"></div>

<button onclick="generateSlip()">Generate Slip</button>
<button onclick="smartGenerate()">🧠 Smart Slip</button>

</div>

<!-- SLIP -->
<div id="picks" class="section">
<div id="result" class="result"></div>
</div>

<!-- OTHER SECTIONS -->
<div id="chat" class="section"><div class="result">💬 Coming soon</div></div>
<div id="bot" class="section"><div class="result">🤖 Coming soon</div></div>
<div id="settings" class="section"><div class="result">⚙️ Settings</div></div>

</div>

<!-- NAV -->
<div class="nav">
<div onclick="switchTab(this,'home')" class="active"><span>🏠</span>Home</div>
<div onclick="switchTab(this,'picks')"><span>📊</span>Slip</div>
<div onclick="switchTab(this,'chat')"><span>💬</span>Chat</div>
<div onclick="switchTab(this,'bot')"><span>🤖</span>Bot</div>
<div onclick="switchTab(this,'settings')"><span>⚙️</span>Settings</div>
</div>

<div id="popup" class="popup"></div>

<script>

const splash = document.getElementById("splash");
const app = document.getElementById("app");
const matches = document.getElementById("matches");
const popup = document.getElementById("popup");

setTimeout(()=>{
  splash.style.display="none";
  app.style.display="block";
},2000);

/* DATA */
const leagues=["All","Premier","La Liga"];

const allMatches=[
  {id:1,name:"Arsenal vs Chelsea",league:"Premier"},
  {id:2,name:"Barcelona vs Sevilla",league:"La Liga"},
  {id:3,name:"Bayern vs Dortmund",league:"All"}
];

const options=[
  {name:"Over 1.5",risk:1},
  {name:"Double Chance",risk:2},
  {name:"BTTS",risk:3}
];

let state={};
let currentList=[...allMatches];

allMatches.forEach(m=>{
  state[m.id]={
    pick:options[0],
    odds:(Math.random()*1+1.2).toFixed(2),
    selected:false
  };
});

/* LEAGUES */
const leagueBar=document.getElementById("leagueBar");

leagues.forEach(l=>{
  let div=document.createElement("div");
  div.className="league";
  div.innerText=l;

  div.onclick=()=>{
    document.querySelectorAll(".league").forEach(x=>x.classList.remove("activeLeague"));
    div.classList.add("activeLeague");

    currentList = l==="All"?allMatches:allMatches.filter(m=>m.league===l);
    loadMatches(currentList);
  };

  leagueBar.appendChild(div);
});

/* LOAD */
function loadMatches(list){
  matches.innerHTML="";

  list.forEach(m=>{
    let s=state[m.id];

    let div=document.createElement("div");
    div.className="match";
    if(s.selected) div.classList.add("selected");

    div.innerHTML=`
      <b>${m.name}</b><br><br>
      <span class="pick">${s.pick.name}</span> | ${s.odds}
    `;

    div.onclick=()=>{
      s.selected=!s.selected;
      div.classList.toggle("selected");
    };

    div.querySelector(".pick").onclick=(e)=>{
      e.stopPropagation();
      openPopup(s,div.querySelector(".pick"));
    };

    matches.appendChild(div);
  });
}

loadMatches(currentList);

/* POPUP */
function openPopup(stateObj,el){
  popup.classList.add("show");

  popup.innerHTML = `
    <b>Select prediction style</b><br>
    <small>🟢 Safe → 🟡 Balanced → 🔴 Risky (higher odds)</small>
  `;

  options.forEach(opt=>{
    let label = opt.risk === 1 ? "🟢 Safe" :
                opt.risk === 2 ? "🟡 Balanced" :
                "🔴 Risky";

    let d=document.createElement("div");
    d.className="option";
    d.innerText=`${opt.name} (${label})`;

    d.onclick=()=>{
      stateObj.pick=opt;
      el.innerText=opt.name;
      popup.classList.remove("show");
    };

    popup.appendChild(d);
  });
}

/* SEARCH */
function searchMatch(val){
  loadMatches(currentList.filter(m=>m.name.toLowerCase().includes(val.toLowerCase())));
}

/* GENERATE */
function generateSlip(){
  let total=1;
  let count=0;
  let html="<b>Slip</b><br><br>";

  allMatches.forEach(m=>{
    let s=state[m.id];
    if(s.selected){
      total*=s.odds;
      count++;
      html+=`${m.name} → ${s.pick.name} (${s.odds})<br>`;
    }
  });

  result.innerHTML = count === 0 ? "⚠️ No selections yet" :
    html + `<br><b>Total Odds: ${total.toFixed(2)}</b>`;

  switchTab(document.querySelectorAll(".nav div")[1],'picks');
}

/* SMART */
function smartGenerate(){
  let target=parseFloat(targetOdds.value) || 3;

  let selected = allMatches.filter(m=>state[m.id].selected);
  if(selected.length === 0){
    selected = [...allMatches];
    selected.forEach(m=>state[m.id].selected=true);
  }

  selected.forEach(m=>state[m.id].pick=options[0]);

  let total=calcTotal(selected);

  let changed=true;
  while(total < target && changed){
    changed=false;

    for(let m of selected){
      let s=state[m.id];
      let i=options.indexOf(s.pick);

      if(i < options.length-1){
        s.pick=options[i+1];
        changed=true;
        total=calcTotal(selected);
        if(total >= target) break;
      }
    }
  }

  loadMatches(currentList);

  let msg = total >= target ? "✅ Target reached"
          : total >= target*0.8 ? "⚠️ Close to target"
          : "❌ Cannot safely reach target";

  let html="<b>Smart Slip</b><br><br>";
  selected.forEach(m=>{
    let s=state[m.id];
    html+=`${m.name} → ${s.pick.name} (${s.odds})<br>`;
  });

  html+=`<br><b>Total Odds: ${total.toFixed(2)}</b><br>${msg}`;

  result.innerHTML=html;

  switchTab(document.querySelectorAll(".nav div")[1],'picks');
}

function calcTotal(list){
  let t=1;
  list.forEach(m=>{
    if(state[m.id].selected){
      t*=state[m.id].odds;
    }
  });
  return t;
}

/* NAV */
function switchTab(el,id){
  document.querySelectorAll(".nav div").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");

  document.querySelectorAll(".section").forEach(s=>{
    s.classList.remove("activeSection");
  });

  document.getElementById(id).classList.add("activeSection");

  if(id==="home"){
    result.innerHTML="";
  }
}

</script>

</body>
</html>
