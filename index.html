<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tipster</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(180deg, #f5f7fa 0%, #dbe2ef 50%, #0a0f2c 100%);
}

/* HEADER */
header {
  text-align: center;
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
}

/* SCREENS */
.screen {
  display: none;
  padding-bottom: 80px;
}
.active {
  display: block;
}

/* MATCH BOX */
.match {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  border: 1px solid #ccc;
}
.selected {
  border: 2px solid #00cc66;
  background: #eafff3;
}

/* BUTTON */
button {
  width: 90%;
  margin: 20px auto;
  display: block;
  padding: 15px;
  background: #00cc66;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

/* RESULT */
.result {
  background: white;
  margin: 15px;
  padding: 15px;
  border-radius: 10px;
}

/* NAVBAR */
.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 12px 0;
  border-top: 1px solid #ccc;
}
.nav-btn {
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<header>🃏 TIPSTER</header>

<!-- MATCH SCREEN -->
<div id="matchesScreen" class="screen active">
  <div id="matches"></div>
  <button onclick="generateSlip()">Generate Smart Slip</button>
</div>

<!-- SLIP SCREEN -->
<div id="slipScreen" class="screen">
  <div class="result" id="result">Your slip will appear here...</div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-btn" onclick="showScreen('matchesScreen')">Matches</div>
  <div class="nav-btn" onclick="showScreen('slipScreen')">Slip</div>
</div>

<script>

// TEAMS
const teams = {
  "Arsenal": 90,
  "Wolves": 75,
  "Man City": 95,
  "Liverpool": 92,
  "Barcelona": 89,
  "Sevilla": 80,
  "Real Madrid": 93,
  "Valencia": 79
};

// MATCHES
const matches = [
  "EPL • Arsenal vs Wolves",
  "EPL • Man City vs Liverpool",
  "La Liga • Barcelona vs Sevilla",
  "La Liga • Real Madrid vs Valencia"
];

// LOAD MATCHES
const container = document.getElementById("matches");

matches.forEach(m => {
  const div = document.createElement("div");
  div.className = "match";
  div.innerText = m;
  div.onclick = () => div.classList.toggle("selected");
  container.appendChild(div);
});

// NAVIGATION
function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

// PREDICTION
function predict(text) {
  const game = text.split("• ")[1];
  const [home, away] = game.split(" vs ");

  const diff = (teams[home] || 75) - (teams[away] || 75);

  let options = [];

  options.push(`${home} Over 0.5 Goals`);
  options.push("Over 1.5 Goals");

  if (diff > 5) options.push(`${home} Double Chance`);
  if (Math.abs(diff) < 5) options.push("Both Teams To Score");
  if (diff > 8) options.push(`${home} Win`);

  return options;
}

// GENERATE
function generateSlip() {
  const selected = document.querySelectorAll(".selected");

  if (!selected.length) {
    alert("Select matches first");
    return;
  }

  let html = "<h3>📋 YOUR SLIP</h3>";

  selected.forEach(m => {
    html += `<b>${m.innerText}</b><br>`;
    predict(m.innerText).forEach(p => {
      html += `• ${p}<br>`;
    });
    html += "<br>";
  });

  document.getElementById("result").innerHTML = html;

  // SWITCH SCREEN
  showScreen("slipScreen");
}

</script>

</body>
</html>
