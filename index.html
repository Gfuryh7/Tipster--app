<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tipster</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(to bottom, #e8ecf5, #cfd8e3, #0a0f2c);
  color: black;
  display: flex;
  flex-direction: column;
  align-items: center;
}

header {
  padding: 20px;
  font-size: 26px;
  font-weight: bold;
}

/* SCREENS */
.screen {
  display: none;
  width: 100%;
  max-width: 500px;
}

.active {
  display: block;
}

/* MATCHES */
.match {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  border: 1px solid #ddd;
}

.selected {
  border: 2px solid #00cc66;
  background: #eafff3;
}

/* BUTTON */
button {
  width: 90%;
  margin: 15px;
  padding: 15px;
  background: #00cc66;
  border: none;
  border-radius: 10px;
  font-weight: bold;
}

/* RESULT */
.result {
  background: white;
  margin: 15px;
  padding: 15px;
  border-radius: 10px;
}

/* TASKBAR */
.navbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  max-width: 500px;
  display: flex;
  justify-content: space-around;
  background: white;
  padding: 10px 0;
  border-top: 1px solid #ccc;
}

.nav-btn {
  font-weight: bold;
  cursor: pointer;
}
</style>
</head>

<body>

<header>🃏 TIPSTER</header>

<!-- MATCH SCREEN -->
<div id="matchesScreen" class="screen active">
  <div id="matches"></div>
  <button onclick="generateSlip()">Generate Smart Slip</button>
</div>

<!-- SLIP SCREEN -->
<div id="slipScreen" class="screen">
  <div class="result" id="result"></div>
</div>

<!-- NAVBAR -->
<div class="navbar">
  <div class="nav-btn" onclick="showScreen('matchesScreen')">Matches</div>
  <div class="nav-btn" onclick="showScreen('slipScreen')">Slip</div>
</div>

<script>

// TEAM STRENGTH
const teams = {
  "Man City": 95,
  "Arsenal": 90,
  "Liverpool": 92,
  "Chelsea": 82,
  "Barcelona": 89,
  "Real Madrid": 93,
  "Sevilla": 80,
  "Bayern": 94,
  "Dortmund": 86,
  "PSG": 91,
  "Lyon": 78,
  "Wolves": 75,
  "Valencia": 79
};

// MATCHES
const matches = [
  { league: "EPL", game: "Arsenal vs Wolves" },
  { league: "EPL", game: "Man City vs Liverpool" },
  { league: "La Liga", game: "Barcelona vs Sevilla" },
  { league: "La Liga", game: "Real Madrid vs Valencia" },
  { league: "Bundesliga", game: "Bayern vs Dortmund" },
  { league: "UCL", game: "PSG vs Bayern" }
];

const container = document.getElementById("matches");

// DISPLAY MATCHES
matches.forEach(m => {
  const div = document.createElement("div");
  div.className = "match";
  div.innerText = `${m.league} • ${m.game}`;
  div.onclick = () => div.classList.toggle("selected");
  container.appendChild(div);
});

// NAVIGATION
function showScreen(screenId) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(screenId).classList.add("active");
}

// SMART PREDICTION
function predict(matchText) {
  const game = matchText.split("• ")[1];
  const [home, away] = game.split(" vs ");

  const h = teams[home] || 75;
  const a = teams[away] || 75;
  const diff = h - a;

  let options = [];

  options.push({
    type: "SAFE",
    pick: `${home} Over 0.5 Goals`,
    reason: `${home} likely to score`
  });

  options.push({
    type: "SAFE",
    pick: "Over 1.5 Goals",
    reason: "Most games exceed 1 goal"
  });

  if (diff > 5) {
    options.push({
      type: "MEDIUM",
      pick: `${home} Double Chance`,
      reason: `${home} unlikely to lose`
    });
  }

  if (Math.abs(diff) < 5) {
    options.push({
      type: "MEDIUM",
      pick: "Both Teams To Score",
      reason: "Balanced teams"
    });
  }

  if (diff > 8) {
    options.push({
      type: "RISKY",
      pick: `${home} Win`,
      reason: `${home} stronger`
    });
  }

  return options;
}

// GENERATE SLIP
function generateSlip() {
  const selected = document.querySelectorAll(".selected");

  if (selected.length === 0) {
    alert("Select matches first");
    return;
  }

  let html = "<h3>📋 YOUR BET SLIP</h3>";

  selected.forEach(m => {
    const options = predict(m.innerText);

    html += `<div style="margin-bottom:15px;">`;
    html += `<b>${m.innerText}</b><br>`;

    options.forEach(opt => {
      html += `
        <div style="margin:5px 0;">
          <span style="color:green;">[${opt.type}]</span> ${opt.pick}<br>
          <small>${opt.reason}</small>
        </div>
      `;
    });

    html += `</div>`;
  });

  document.getElementById("result").innerHTML = html;

  // AUTO SWITCH TO SLIP SCREEN
  showScreen("slipScreen");
}

</script>

</body>
</html>
