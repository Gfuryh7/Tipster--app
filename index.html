<script>

setTimeout(()=>{
document.getElementById("splash").style.display="none";
document.getElementById("app").style.display="block";
},1800);

const leagues = ["All","Premier","La Liga","Bundesliga"];

const API_KEY = "PASTE_YOUR_REAL_API_KEY_HERE";

async function loadLiveMatches(){

try{

console.log("Loading live matches...");

const response = await fetch(
"https://v3.football.api-sports.io/fixtures?live=all",
{
method:"GET",
headers:{
"x-apisports-key": API_KEY
}
}
);

console.log("HTTP STATUS:", response.status);

const text = await response.text();

console.log("RAW RESPONSE:", text);

const data = JSON.parse(text);

console.log("PARSED DATA:", data);

if(data.response && data.response.length > 0){

allMatches.length = 0;

data.response.forEach((game,index)=>{

allMatches.push({
id:index + 1,
name:
game.teams.home.name +
" vs " +
game.teams.away.name,
league: game.league.name
});

});

currentList = [...allMatches];

loadMatches(currentList);

alert("🔥 Live matches loaded successfully");

}else{

alert("⚠️ No live matches found");

}

}catch(err){

console.log("FULL ERROR:", err);

alert("❌ CHECK CONSOLE LOGS");

}

}

const allMatches = [
{id:1,name:"Arsenal vs Chelsea",league:"Premier"},
{id:2,name:"Barcelona vs Sevilla",league:"La Liga"},
{id:3,name:"Bayern vs Dortmund",league:"Bundesliga"},
{id:4,name:"Liverpool vs Spurs",league:"Premier"},
{id:5,name:"Real Madrid vs Valencia",league:"La Liga"}
];

const options = [
{name:"Over 1.5",risk:1,multiplier:1.4},
{name:"Double Chance",risk:1,multiplier:1.3},
{name:"Over 2.5",risk:2,multiplier:1.7},
{name:"BTTS",risk:2,multiplier:1.8},
{name:"Win + Over 2.5",risk:3,multiplier:2.3}
];

let state = JSON.parse(localStorage.getItem("tipsterState")) || {};
let savedCodes = JSON.parse(localStorage.getItem("tipsterCodes")) || {};
let currentLeague = localStorage.getItem("tipsterLeague") || "All";
let currentList = [...allMatches];

allMatches.forEach(m=>{
if(!state[m.id]){
state[m.id]={
pick:options[0],
odds:(Math.random()*1+1.2).toFixed(2),
selected:false
};
}
});

function saveState(){
localStorage.setItem("tipsterState",JSON.stringify(state));
localStorage.setItem("tipsterLeague",currentLeague);
localStorage.setItem("targetOdds",targetOdds.value);
localStorage.setItem("tipsterCodes",JSON.stringify(savedCodes));
}

targetOdds.value = localStorage.getItem("targetOdds") || "";

function updateCounter(){
let count = Object.values(state).filter(x=>x.selected).length;
document.getElementById("counter").innerText = count + " Selected";
}

function clearSelections(){

allMatches.forEach(m=>{
state[m.id].selected = false;
});

saveState();

loadMatches(currentList);

showLoadArea();

}

const leagueBar = document.getElementById("leagueBar");

leagues.forEach(l=>{

let div = document.createElement("div");

div.className="league";
div.innerText=l;

if(l===currentLeague){
div.classList.add("activeLeague");
}

div.onclick=()=>{

currentLeague=l;

document.querySelectorAll(".league")
.forEach(x=>x.classList.remove("activeLeague"));

div.classList.add("activeLeague");

currentList =
l==="All"
? allMatches
: allMatches.filter(m=>m.league===l);

saveState();

loadMatches(currentList);

loadLiveMatches();

};

leagueBar.appendChild(div);

});

const matches = document.getElementById("matches");

function loadMatches(list){

matches.innerHTML="";

list.forEach(m=>{

let s = state[m.id];

let div = document.createElement("div");

div.className="match";

if(s.selected){
div.classList.add("selected");
}

div.innerHTML=`
<div class="matchTitle">${m.name}</div>

<div class="matchBottom">
<div class="pick">${s.pick.name}</div>
<div class="odds">${s.odds}</div>
</div>
`;

div.onclick=()=>{

s.selected=!s.selected;

div.classList.toggle("selected");

saveState();
updateCounter();

};

div.querySelector(".pick").onclick=(e)=>{
e.stopPropagation();
openPopup(s,div.querySelector(".pick"));
};

matches.appendChild(div);

});

updateCounter();

}

currentList =
currentLeague==="All"
? allMatches
: allMatches.filter(m=>m.league===currentLeague);

loadMatches(currentList);

const popup = document.getElementById("popup");

function openPopup(stateObj,el){

popup.classList.add("show");

popup.innerHTML="<h2>Select Prediction</h2>";

options.forEach(opt=>{

let d = document.createElement("div");

d.className="option";

let risk =
opt.risk===1 ? "🟢 Safer" :
opt.risk===2 ? "🟡 Balanced" :
"🔴 Aggressive";

d.innerHTML=`
<b>${opt.name}</b>
<br>
<small>${risk}</small>
`;

d.onclick=()=>{

stateObj.pick=opt;

el.innerText=opt.name;

popup.classList.remove("show");

saveState();

};

popup.appendChild(d);

});

}

document.addEventListener("click",(e)=>{

if(
popup.classList.contains("show")
&&
!popup.contains(e.target)
&&
!e.target.classList.contains("pick")
){
popup.classList.remove("show");
}

});

function searchMatch(val){

loadMatches(
currentList.filter(m=>
m.name.toLowerCase().includes(val.toLowerCase())
)
);

}

function calculateTotal(list){

let total = 1;

list.forEach(m=>{

if(state[m.id].selected){

let odd =
parseFloat(state[m.id].odds);

let multiplier =
state[m.id].pick.multiplier;

total *= odd * multiplier;

}

});

return total;

}

function smartGenerate(){

let target = parseFloat(targetOdds.value);

let selected = allMatches.filter(m=>state[m.id].selected);

if(selected.length===0){

selected=[...allMatches];

selected.forEach(m=>{
state[m.id].selected=true;
});

}

selected.forEach(m=>{
state[m.id].pick=options[0];
});

let total = calculateTotal(selected);

if(!isNaN(target)){

while(total < target){

let upgraded = false;

for(let m of selected){

let s = state[m.id];

let index = options.findIndex(o=>o.name===s.pick.name);

if(index < options.length-1){

s.pick = options[index+1];

upgraded = true;

total = calculateTotal(selected);

if(total >= target){
break;
}

}

}

if(!upgraded){
break;
}

}

}

saveState();

generateSlip();

}

function showLoadArea(){

result.innerHTML = `

<div class="empty">
⚠️ No selections yet
</div>

<div class="codeArea">

<h3>🔐 Load Slip Code</h3>

<input
class="codeInput"
id="loadCodeInput"
placeholder="Paste slip code">

<button class="altBtn"
onclick="loadSlipCode()">
Load Slip Code
</button>

</div>

`;

}

function generateSlip(){

let selected =
allMatches.filter(m=>state[m.id].selected);

if(selected.length===0){

showLoadArea();

return;

}

let target =
parseFloat(targetOdds.value);

let safeHtml =
buildSlip(selected,"safe",target);

let balancedHtml =
buildSlip(selected,"balanced",target);

let riskyHtml =
buildSlip(selected,"risky",target);

let code =
"TIP-" +
Math.random().toString(36)
.substring(2,8)
.toUpperCase();

savedCodes[code] =
JSON.stringify(state);

saveState();

result.innerHTML = `

${safeHtml}

${balancedHtml}

${riskyHtml}

<div class="codeArea">

<h3>🔐 Slip Code</h3>

<br>

<b id="generatedCode">${code}</b>

<br><br>

<button class="generateBtn"
onclick="copySlipCode()">
📋 Copy Code
</button>

<input
class="codeInput"
id="loadCodeInput"
placeholder="Paste code to load slip">

<button class="altBtn"
onclick="loadSlipCode()">
Load Slip Code
</button>

<button class="smartBtn"
onclick="smartGenerate()">
🔄 Generate Again
</button>

</div>

`;

switchTab(document.querySelectorAll(".navItem")[1],"picks");

}

function buildSlip(selected,type,target){

let total = 1;

let html = `
<div class="slipCard">

<div class="slipHeader">

<h3>
${type==="safe"
? "🟢 Safer Slip"
: type==="balanced"
? "🟡 Balanced Slip"
: "🔴 Aggressive Slip"}
</h3>

<div class="badge ${
type==="safe"
? "safe"
: type==="balanced"
? "balance"
: "risky"
}">
${type.toUpperCase()}
</div>

</div>
`;

selected.forEach(m=>{

let option;

if(type==="safe"){
option = options[0];
}

if(type==="balanced"){
option = target && target > 10
? options[3]
: options[2];
}

if(type==="risky"){
option = target && target > 15
? options[4]
: options[3];
}

let odd =
parseFloat(state[m.id].odds)
*
option.multiplier;

total *= odd;

html += `

<div class="slipItem"
ontouchstart="startTouch(event,${m.id})"
ontouchmove="moveTouch(event,this)"
ontouchend="endTouch(event,this,${m.id})">

<div class="swipeHint">⬅ Swipe</div>

<b>${m.name}</b>

<br><br>

${option.name}

</div>

`;

});

html += `

<div class="total">
Total Odds: ${total.toFixed(2)}
</div>

`;

if(target && !isNaN(target)){

html += `

<br>

<div style="
padding:14px;
border-radius:18px;
background:#101938;
">

🎯 Target Odds:
<b>${target}</b>

<br><br>

${total >= target
? "✅ Target Reached"
: "⚠️ Below Target"}

</div>

`;

}

html += "</div>";

return html;

}

function loadSlipCode(){

let val =
document.getElementById("loadCodeInput")
.value
.trim();

if(savedCodes[val]){

state = JSON.parse(savedCodes[val]);

saveState();

loadMatches(currentList);

generateSlip();

alert("Slip loaded successfully 🔥");

}else{
alert("Invalid slip code");
}

}

function copySlipCode(){

let code =
document.getElementById("generatedCode")
.innerText;

navigator.clipboard.writeText(code);

alert("Slip code copied 🔥");

}

function switchTab(el,id){

document.querySelectorAll(".navItem")
.forEach(x=>x.classList.remove("activeNav"));

el.classList.add("activeNav");

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("activeSection"));

document.getElementById(id)
.classList.add("activeSection");

history.pushState({page:id},"",`#${id}`);

}

function openSlipTab(el){

switchTab(el,'picks');

let selected =
allMatches.filter(m=>state[m.id].selected);

if(selected.length===0){
showLoadArea();
}else{
generateSlip();
}

}

window.onpopstate = ()=>{

let hash =
location.hash.replace("#","");

if(hash){

document.querySelectorAll(".section")
.forEach(s=>s.classList.remove("activeSection"));

document.getElementById(hash)
.classList.add("activeSection");

}

};

let startX = 0;

function startTouch(e,id){
startX = e.touches[0].clientX;
}

function moveTouch(e,el){

let current =
e.touches[0].clientX;

let diff =
current - startX;

if(diff<0){
el.style.transform =
`translateX(${diff}px)`;
}

}

function endTouch(e,el,id){

let end =
e.changedTouches[0].clientX;

let diff =
end - startX;

if(diff < -120){

state[id].selected=false;

saveState();

el.style.opacity="0";

setTimeout(()=>{
loadMatches(currentList);
generateSlip();
},250);

}else{
el.style.transform="translateX(0)";
}

}

targetOdds.addEventListener("input",saveState);

updateCounter();

showLoadArea();

</script>
