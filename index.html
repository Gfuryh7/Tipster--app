<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tipster</title>

<style>
body {
  margin: 0;
  font-family: Arial;
}

/* ===== SPLASH ===== */
#splash {
  position: fixed;
  width: 100%;
  height: 100vh;
  background: linear-gradient(135deg, #1a0033, #3a0ca3, #720026);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
}

.logo {
  font-size: 40px;
  color: white;
  animation: flipZoom 2.5s ease;
}

@keyframes flipZoom {
  0% { transform: rotateY(0deg) scale(0.5); opacity: 0; }
  50% { transform: rotateY(180deg) scale(1.2); opacity: 1; }
  100% { transform: rotateY(360deg) scale(1); }
}

/* ===== APP ===== */
#app {
  display: none;
  background: linear-gradient(to bottom, #f5f9ff, #dbe9ff);
  min-height: 100vh;
  padding-bottom: 80px;
}

header {
  text-align: center;
  padding: 20px;
  font-size: 22px;
  font-weight: bold;
}

/* MATCHES */
.match {
  background: white;
  margin: 10px;
  padding: 15px;
  border-radius: 10px;
  cursor: pointer;
}

.selected {
  border: 2px solid #2962ff;
  background: #e3f2fd;
}

/* BUTTON */
button {
  width: 90%;
  margin: 20px;
  padding: 15px;
  border: none;
  border-radius: 10px;
  background: #2962ff;
  color: white;
  font-size: 16px;
}

/* RESULT */
.result {
  margin: 15px;
  padding: 15px;
  background: white;
  border-radius: 10px;
}

/* NAV BAR */
.nav {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  justify-content: space-around;
  padding: 10px 0;
  border-top: 1px solid #ccc;
}

.nav div {
  text-align: center;
  font-size: 14px;
  cursor: pointer;
}

/* SECTIONS */
.section {
  display: none;
}
.active {
  display: block;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
  <div class="logo">🃏 Tipster</div>
</div>

<!-- APP -->
<div id="app">

<header>Tipster</header>

<!-- HOME -->
<div id="home" class="section active">
  <div id="matches"></div>
  <button onclick="generateSlip()">Generate Slip</button>
</div>

<!-- PREDICTIONS -->
<div id="predictions" class="section">
  <div id="result" class="result"></div>
  <button onclick="copySlip()">Copy Slip</button>
</div>

<!-- CHAT -->
<div id="chat" class="section">
  <div class="result">💬 Chat coming soon...</div>
</div>

<!-- BOT -->
<div id="bot" class="section">
  <div class="result">🤖 Ask me anything (coming soon)</div>
</div>

</div>

<!-- NAV -->
<div class="nav">
  <div onclick="showSection('home')">🏠 Home</div>
  <div onclick="showSection('predictions')">📊 Picks</div>
  <div onclick="showSection('chat')">💬 Chat</div>
  <div onclick="showSection('bot')">🤖 Bot</div>
</div>

<script>

/* SPLASH */
setTimeout(() => {
  document.getElementById("splash").style.display = "none";
  document.getElementById("app").style.display = "block";
}, 2500);

/* MATCHES */
const matches = [
  "Arsenal vs Chelsea",
  "Barcelona vs Sevilla",
  "Bayern vs Dortmund",
  "Man City vs Liverpool",
  "PSG vs Lyon"
];

const container = document.getElementById("matches");

matches.forEach(match => {
  const div = document.createElement("div");
  div.className = "match";
  div.innerText = match;

  div.onclick = () => {
    div.classList.toggle("selected");
  };

  container.appendChild(div);
});

/* PREDICTIONS WITH ODDS */
function generateSlip() {
  const selected = document.querySelectorAll(".selected");

  if (selected.length === 0) {
    alert("Select matches");
    return;
  }

  let totalOdds = 1;
  let resultHTML = "<b>🧾 Tipster Slip</b><br><br>";

  selected.forEach(match => {
    let option = getPrediction();
    let odds = (Math.random() * (2.0 - 1.2) + 1.2).toFixed(2);

    totalOdds *= odds;

    resultHTML += `
      <div onclick="editPick(this)" style="margin-bottom:10px;cursor:pointer;">
        ${match.innerText} → ${option} (${odds})
      </div>
    `;
  });

  resultHTML += `<br><b>Total Odds: ${totalOdds.toFixed(2)}</b>`;

  document.getElementById("result").innerHTML = resultHTML;

  showSection('predictions');
}

/* OPTIONS */
function getPrediction() {
  const options = [
    "Over 1.5 Goals",
    "Double Chance",
    "BTTS"
  ];
  return options[Math.floor(Math.random() * options.length)];
}

/* EDIT PICK */
function editPick(el) {
  let newOption = prompt("Change option:");
  if (newOption) {
    el.innerHTML = el.innerHTML.split("→")[0] + "→ " + newOption;
  }
}

/* COPY */
function copySlip() {
  const text = document.getElementById("result").innerText;
  navigator.clipboard.writeText(text);
  alert("Copied!");
}

/* NAVIGATION */
function showSection(id) {
  document.querySelectorAll(".section").forEach(sec => {
    sec.classList.remove("active");
  });
  document.getElementById(id).classList.add("active");
}

</script>

</body>
</html>
